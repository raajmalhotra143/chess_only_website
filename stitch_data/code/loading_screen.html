<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#131313",
              "surface-variant": "#353534",
              "error-container": "#93000a",
              "outline": "#8a9485",
              "on-secondary-fixed-variant": "#343d96",
              "primary-fixed-dim": "#88d982",
              "secondary-container": "#343d96",
              "on-secondary-container": "#a8afff",
              "surface": "#131313",
              "secondary": "#bdc2ff",
              "surface-container-high": "#2a2a2a",
              "inverse-surface": "#e5e2e1",
              "surface-container-highest": "#353534",
              "surface-container-lowest": "#0e0e0e",
              "on-secondary-fixed": "#000767",
              "tertiary-container": "#b14b6f",
              "outline-variant": "#40493d",
              "surface-container": "#201f1f",
              "surface-dim": "#131313",
              "on-error-container": "#ffdad6",
              "on-tertiary": "#610931",
              "on-secondary": "#1b247f",
              "inverse-on-surface": "#313030",
              "on-background": "#e5e2e1",
              "surface-container-low": "#1c1b1b",
              "primary-fixed": "#a3f69c",
              "tertiary-fixed-dim": "#ffb1c7",
              "secondary-fixed-dim": "#bdc2ff",
              "on-primary-fixed": "#002204",
              "tertiary": "#ffb1c7",
              "primary": "#88d982",
              "on-tertiary-container": "#ffedf0",
              "on-surface-variant": "#bfcaba",
              "on-surface": "#e5e2e1",
              "on-primary-fixed-variant": "#005312",
              "on-primary": "#003909",
              "inverse-primary": "#1b6d24",
              "surface-tint": "#88d982",
              "tertiary-fixed": "#ffd9e2",
              "on-tertiary-fixed": "#3f001c",
              "error": "#ffb4ab",
              "secondary-fixed": "#e0e0ff",
              "primary-container": "#2e7d32",
              "on-primary-container": "#cbffc2",
              "on-tertiary-fixed-variant": "#7f2448",
              "surface-bright": "#393939",
              "on-error": "#690005"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes subtle-rotate {
            0% { transform: rotate(0deg) scale(1); opacity: 0.8; }
            50% { transform: rotate(180deg) scale(1.1); opacity: 1; }
            100% { transform: rotate(360deg) scale(1); opacity: 0.8; }
        }
        .animate-loader {
            animation: subtle-rotate 4s infinite ease-in-out;
        }
        .glass-panel {
            background: rgba(42, 42, 42, 0.6);
            backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col overflow-hidden">
<!-- TopNavBar (Hidden in focused loading state per "Semantic Shell" Mandate) -->
<!-- The TopNavBar is excluded to prioritize the focused loading journey -->
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center relative px-6">
<!-- Background Ambient Glow -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-1/4 -left-1/4 w-1/2 h-1/2 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-1/4 -right-1/4 w-1/2 h-1/2 bg-secondary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Central Loading Cluster -->
<div class="relative z-10 flex flex-col items-center max-w-lg w-full">
<!-- Strategic Loader -->
<div class="relative mb-12 flex items-center justify-center">
<!-- Inner Glow -->
<div class="absolute w-32 h-32 bg-primary/20 rounded-full blur-3xl animate-pulse"></div>
<!-- Rotating Chess Piece Icon -->
<div class="animate-loader p-8 rounded-full border border-outline-variant/20 bg-surface-container-low flex items-center justify-center shadow-2xl">
<span class="material-symbols-outlined text-7xl text-primary" style="font-variation-settings: 'wght' 200;">chess_pawn</span>
</div>
<!-- Orbiting Elements (Decorative) -->
<div class="absolute w-48 h-48 border border-outline-variant/10 rounded-full animate-[spin_10s_linear_infinite]">
<div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-2 h-2 bg-primary rounded-full shadow-[0_0_10px_#88d982]"></div>
</div>
</div>
<!-- Typography Content -->
<div class="text-center space-y-4">
<h1 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tighter text-on-surface">
                    Connecting to game<span class="text-primary animate-bounce inline-block">...</span>
</h1>
<p class="font-body text-on-surface-variant text-lg max-w-xs mx-auto leading-relaxed">
                    Establishing a secure link to the grandmaster's server. Your board is being prepared.
                </p>
</div>
<!-- Status Indicator -->
<div class="mt-12 glass-panel px-6 py-3 rounded-full border border-outline-variant/20 flex items-center gap-4">
<div class="flex gap-1.5">
<div class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></div>
<div class="w-1.5 h-1.5 bg-primary/60 rounded-full animate-pulse [animation-delay:200ms]"></div>
<div class="w-1.5 h-1.5 bg-primary/30 rounded-full animate-pulse [animation-delay:400ms]"></div>
</div>
<span class="font-label text-xs uppercase tracking-[0.2em] text-on-surface/60 font-semibold">
                    The Silent Strategist v2.4
                </span>
</div>
</div>
<!-- Progress Track (Minimalist) -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-surface-container-lowest">
<div class="h-full bg-gradient-to-r from-primary/20 via-primary to-primary/20 w-1/3 animate-[translateX_3s_infinite_ease-in-out]"></div>
</div>
</main>
<!-- Footer (Using Shared Components Logic - Suppressed but defined for Contextual Relevance Check) -->
<!-- Suppressed to maintain focus on the loading action -->
<!-- Floating Action Button (FAB) - Suppressed on Task-Focused Screens -->
<style>
        @keyframes translateX {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
        
        /* Custom scrollbar for consistency if needed */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #131313;
        }
        ::-webkit-scrollbar-thumb {
            background: #353534;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #40493d;
        }
    </style>
<!-- Decorative Corner Graphic -->
<div class="fixed top-12 left-12 opacity-10 pointer-events-none hidden md:block">
<div class="font-headline text-8xl font-black italic tracking-tighter text-outline">CHESS</div>
</div>
<div class="fixed bottom-12 right-12 opacity-10 pointer-events-none hidden md:block">
<div class="font-headline text-8xl font-black italic tracking-tighter text-outline">ONLINE</div>
</div>
</body></html>
